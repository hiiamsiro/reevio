services:
  postgres:
    image: postgres:16-alpine
    container_name: reevio-postgres
    environment:
      POSTGRES_DB: reevio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reevio-redis
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: reevio-web
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      WATCHPACK_POLLING_INTERVAL: '3000'
      TSC_WATCHFILE: UsePolling
      TSC_WATCHDIRECTORY: RecursiveDirectoryUsingDynamicPriorityPolling
      NEXT_PUBLIC_API_URL: http://localhost:3000
      API_URL: http://api:4000
      AUTH_SECRET: change-me-in-development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/reevio
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      NODE_OPTIONS: --max-old-space-size=4096
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - web_next:/app/apps/web/.next
      - web_root_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_config_node_modules:/app/packages/config/node_modules
      - web_types_node_modules:/app/packages/types/node_modules
      - web_tsconfig_node_modules:/app/packages/tsconfig/node_modules
    command:
      [
        'sh',
        '-lc',
        'pnpm -F web dev',
      ]
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: reevio-api
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      TSC_WATCHFILE: UsePolling
      TSC_WATCHDIRECTORY: RecursiveDirectoryUsingDynamicPriorityPolling
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/reevio
      REDIS_URL: redis://redis:6379
      API_URL: http://localhost:4000
      AUTH_SECRET: change-me-in-development
      STORAGE_DRIVER: local
      STORAGE_PATH: /app/storage
      STORAGE_PUBLIC_BASE_URL: http://localhost:4000
      NODE_ENV: development
      PORT: '4000'
      NEXT_PUBLIC_API_URL: http://localhost:3000
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - shared_storage:/app/storage
      - api_root_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - api_config_node_modules:/app/packages/config/node_modules
      - api_types_node_modules:/app/packages/types/node_modules
      - api_tsconfig_node_modules:/app/packages/tsconfig/node_modules
    command:
      [
        'sh',
        '-lc',
        'cd apps/api && ./node_modules/.bin/prisma db push --accept-data-loss && ./node_modules/.bin/tsx prisma/seed.ts && ./node_modules/.bin/nest start --watch',
      ]
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: reevio-worker
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      TSC_WATCHFILE: UsePolling
      TSC_WATCHDIRECTORY: RecursiveDirectoryUsingDynamicPriorityPolling
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/reevio
      API_URL: http://api:4000
      STORAGE_DRIVER: local
      STORAGE_PATH: /app/storage
      STORAGE_PUBLIC_BASE_URL: http://localhost:4000
      NODE_ENV: development
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
      - shared_storage:/app/storage
      - worker_root_node_modules:/app/node_modules
      - worker_app_node_modules:/app/apps/worker/node_modules
      - worker_config_node_modules:/app/packages/config/node_modules
      - worker_types_node_modules:/app/packages/types/node_modules
      - worker_tsconfig_node_modules:/app/packages/tsconfig/node_modules
    command:
      [
        'sh',
        '-lc',
        'mkdir -p apps/worker/prisma && cp apps/api/prisma/schema.prisma apps/worker/prisma/schema.prisma && pnpm -F worker db:generate && pnpm -F worker dev',
      ]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  web_root_node_modules:
  web_app_node_modules:
  web_next:
  web_config_node_modules:
  web_types_node_modules:
  web_tsconfig_node_modules:
  api_root_node_modules:
  api_app_node_modules:
  api_config_node_modules:
  api_types_node_modules:
  api_tsconfig_node_modules:
  worker_root_node_modules:
  worker_app_node_modules:
  worker_config_node_modules:
  worker_types_node_modules:
  worker_tsconfig_node_modules:
  shared_storage:
